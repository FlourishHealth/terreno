name: Demo Build

jobs:
  build_ios:
    name: Build iOS
    type: build
    params:
      platform: ios
      profile: development

  build_android:
    name: Build Android
    type: build
    params:
      platform: android
      profile: development

  report_github:
    name: Report to GitHub
    after: [build_ios, build_android]
    steps:
      - uses: eas/checkout
      - run: |
          set -e

          IOS_STATUS="${{ after.build_ios.status }}"
          ANDROID_STATUS="${{ after.build_android.status }}"
          [ "$IOS_STATUS" = "success" ] && IOS_STATE="success" || IOS_STATE="failure"
          [ "$ANDROID_STATUS" = "success" ] && ANDROID_STATE="success" || ANDROID_STATE="failure"

          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          BASE_URL="https://expo.dev/accounts/flourishhealth/projects/terreno-demo/builds"

          IOS_DEP_ID=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ env.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"$SHA\",\"environment\":\"Demo iOS (Development)\",\"auto_merge\":false,\"required_contexts\":[],\"transient_environment\":true,\"production_environment\":false}" \
            "https://api.github.com/repos/$REPO/deployments" | jq -r '.id')

          curl -sf -X POST \
            -H "Authorization: Bearer ${{ env.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"state\":\"$IOS_STATE\",\"environment_url\":\"$BASE_URL/${{ needs.build_ios.outputs.build_id }}\",\"log_url\":\"$BASE_URL/${{ needs.build_ios.outputs.build_id }}\"}" \
            "https://api.github.com/repos/$REPO/deployments/$IOS_DEP_ID/statuses"

          ANDROID_DEP_ID=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ env.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"$SHA\",\"environment\":\"Demo Android (Development)\",\"auto_merge\":false,\"required_contexts\":[],\"transient_environment\":true,\"production_environment\":false}" \
            "https://api.github.com/repos/$REPO/deployments" | jq -r '.id')

          curl -sf -X POST \
            -H "Authorization: Bearer ${{ env.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"state\":\"$ANDROID_STATE\",\"environment_url\":\"$BASE_URL/${{ needs.build_android.outputs.build_id }}\",\"log_url\":\"$BASE_URL/${{ needs.build_android.outputs.build_id }}\"}" \
            "https://api.github.com/repos/$REPO/deployments/$ANDROID_DEP_ID/statuses"
