name: Example Frontend PR Update

# Fast-path PR workflow. Publishes only an EAS Update after GitHub Actions has
# confirmed both platforms already have matching dev builds.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number for branch/comment context
        type: string
        required: true
      pr_title:
        description: PR title for the update message
        type: string
        required: true

defaults:
  tools:
    bun: 1.3.10
    node: "22"

jobs:
  publish_update:
    name: Publish EAS Update for PR
    outputs:
      first_update_group_id: ${{ steps.publish.outputs.first_update_group_id }}
    steps:
      - uses: eas/checkout
      - uses: eas/use_npm_token
      - uses: eas/install_node_modules
      - name: Compile workspace packages
        working_directory: ../
        run: bun run compile
      - name: Publish EAS Update
        id: publish
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_TITLE: ${{ inputs.pr_title }}
        run: |
          if [[ "$PR_NUMBER" == *'${{'* || "$PR_TITLE" == *'${{'* ]]; then
            echo "EAS workflow inputs were not resolved; refusing to publish a templated PR update."
            exit 1
          fi

          update_json=$(bunx eas-cli@latest update \
            --branch "pr-${PR_NUMBER}" \
            --message "PR #${PR_NUMBER}: ${PR_TITLE}" \
            --non-interactive \
            --json)
          first_id=$(echo "$update_json" | jq -r '.[0].group')
          set-output first_update_group_id "$first_id"
          echo "✓ EAS Update published to branch pr-${PR_NUMBER} (group ${first_id})"
