name: Example Frontend PR Build

# Invoked by .github/workflows/eas-pr.yml slow path and manual seed builds.
# GitHub Actions publishes PR EAS Updates directly; this workflow only creates
# missing native dev builds.

on:
  workflow_dispatch: {}

defaults:
  tools:
    bun: 1.3.10
    node: "22"

jobs:
  fingerprint:
    name: Compute fingerprint
    type: fingerprint

  get_ios_build:
    name: Check for matching iOS dev build
    type: get-build
    needs: [fingerprint]
    params:
      platform: ios
      profile: development
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}

  get_android_build:
    name: Check for matching Android dev build
    type: get-build
    needs: [fingerprint]
    params:
      platform: android
      profile: development
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}

  build_ios:
    name: Build iOS dev client
    type: build
    needs: [get_ios_build]
    if: ${{ needs.get_ios_build.outputs.build_id == '' }}
    params:
      platform: ios
      profile: development

  build_android:
    name: Build Android dev client
    type: build
    needs: [get_android_build]
    if: ${{ needs.get_android_build.outputs.build_id == '' }}
    params:
      platform: android
      profile: development

