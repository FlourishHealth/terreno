name: Demo Deploy

on:
  push:
    branches:
      - master
    paths:
      - "demo/**"
      - "ui/**"
      - ".github/workflows/demo-deploy.yml"
  pull_request:
  # Allows publish-on-tag.yml to force a fresh production deploy after a release,
  # so the public demo always reflects the latest published version.
  workflow_dispatch:

jobs:
  check-changes:
    name: Check for relevant changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v7

      - name: Check PR diff for demo or ui changes
        id: check
        run: |
          CHANGES=$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --jq '.[].filename' | grep -cE '^(demo/|ui/)' || true)
          echo "has_changes=$( [ "$CHANGES" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    name: Build Demo
    needs: [check-changes]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.has_changes == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun + node_modules
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install root dependencies (workspace)
        run: bun install --frozen-lockfile

      - name: Build UI dependency
        run: bun run compile
        working-directory: ui

      - name: Generate UI type documentation
        run: bun run types
        working-directory: ui

      - name: Export demo for web
        run: bun run export
        working-directory: demo

      - name: Fix asset paths for Netlify
        run: bash demo/scripts/fix-netlify-assets.sh demo/dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: demo-dist
          path: demo/dist
          retention-days: 1

  deploy-production:
    name: Deploy to Production
    needs: build
    # `always()` is required because `build` needs `check-changes`, which is skipped on
    # push/workflow_dispatch events — that skip otherwise propagates down the dependency
    # chain and silently skips this job even when `build` itself succeeded.
    #
    # workflow_dispatch is allowed regardless of ref (not just refs/heads/master) because
    # publish-on-tag.yml dispatches this against the release tag itself, so the demo is
    # pinned to exactly what was published rather than whatever master drifts to next.
    if: |
      always() &&
      needs.build.result == 'success' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      statuses: write
    steps:
      - uses: actions/checkout@v7

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: demo-dist
          path: dist

      - name: Get commit message header
        id: commit
        run: echo "message=$(echo "$COMMIT_MSG" | head -n 1)" >> "$GITHUB_OUTPUT"
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Create GitHub Deployment
        id: create-deployment
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'demo',
              auto_merge: false,
              required_contexts: [],
              description: 'Demo Production Deployment'
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Set deployment status to in_progress
        uses: actions/github-script@v9.0.0
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Deploying demo to Netlify'
            });

      - name: Deploy to Netlify
        id: netlify
        uses: nwtgck/actions-netlify@v4.0
        with:
          publish-dir: "./dist"
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions - ${{ steps.commit.outputs.message }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-github-deployment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEMO_SITE_ID }}
        timeout-minutes: 5

      - name: Set deployment status to success
        if: success()
        uses: actions/github-script@v9.0.0
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'success',
              environment_url: '${{ steps.netlify.outputs.deploy-url }}',
              description: 'Demo deployed successfully'
            });

      - name: Set deployment status to failure
        if: failure()
        uses: actions/github-script@v9.0.0
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Demo deployment failed'
            });

  deploy-preview:
    name: Deploy Preview
    needs: build
    # See note on deploy-production about why `always()` + explicit result check is required.
    if: always() && needs.build.result == 'success' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: demo-preview-pr-${{ github.event.pull_request.number }}
      url: ${{ steps.netlify.outputs.deploy-url }}
    permissions:
      contents: read
      deployments: write
      statuses: write
    steps:
      - uses: actions/checkout@v7

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: demo-dist
          path: dist

      - name: Deploy to Netlify
        id: netlify
        uses: nwtgck/actions-netlify@v4.0
        with:
          publish-dir: "./dist"
          production-deploy: false
          alias: pr-${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Preview for PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-github-deployment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEMO_SITE_ID }}
        timeout-minutes: 5
