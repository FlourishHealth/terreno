name: Example Frontend EAS Build

on:
  push:
    branches:
      - master
      - expo-workflows-3

jobs:
  build:
    name: EAS Build (Example Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Workflow
        run: eas workflow:run .eas/workflows/example-frontend-build.yml --non-interactive
        working-directory: example-frontend
