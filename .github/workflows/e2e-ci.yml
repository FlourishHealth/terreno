name: E2E Tests

on:
  push:
    paths:
      - "example-frontend/app/**"
      - "example-frontend/constants/**"
      - "example-frontend/hooks/**"
      - "example-frontend/lib/**"
      - "example-frontend/store/**"
      - "example-frontend/utils/**"
      - "example-frontend/e2e/**"
      - "example-frontend/playwright.config.ts"
      - "example-frontend/package.json"
      - "example-backend/src/**"
      - "bun.lock"
      - "ui/src/**"
      - "rtk/src/**"
      - "api/src/**"
      - "ai/src/**"
      - "admin-backend/src/**"
      - "admin-frontend/src/**"
      - "feature-flags/src/**"
      - "api-health/src/**"
      - ".github/workflows/e2e-ci.yml"

jobs:
  e2e:
    name: "E2E · ${{ matrix.spec }}"
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    strategy:
      fail-fast: false
      matrix:
        # One shard per spec file. Keep this list in sync with example-frontend/e2e/
        # so every spec runs in CI; a shard's playwright step should stay under ~2
        # minutes — split the spec file if it grows past that.
        spec:
          - login
          - signup
          - todos
          - profile
          - admin
          - consents
          - ai-chat
          - realtime
          - syncdb-load-delta
          - syncdb-offline
          - syncdb-conflicts
          - syncdb-storage
          - syncdb-chaos
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ github.ref }}-
            bun-${{ runner.os }}-

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: "6.0"
          mongodb-image: mirror.gcr.io/library/mongo
          # Replica set is required for MongoDB change streams,
          # which power the RealtimeApp WebSocket sync.
          mongodb-replica-set: rs0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile workspace packages
        run: bun run compile

      - name: Resolve E2E auth secrets
        run: |
          set -euo pipefail
          missing=()
          resolve_secret() {
            local name="$1"
            local value="$2"
            local fallback="$3"
            if [ -n "$value" ]; then
              echo "$name=$value" >> "$GITHUB_ENV"
            elif [ "$GITHUB_ACTOR" = "dependabot[bot]" ]; then
              echo "::warning::Using CI fallback for $name (Dependabot PRs cannot access repository secrets)"
              echo "$name=$fallback" >> "$GITHUB_ENV"
            else
              missing+=("$name")
            fi
          }
          resolve_secret "TOKEN_SECRET" "$INPUT_TOKEN_SECRET" "ci-e2e-token-secret"
          resolve_secret "REFRESH_TOKEN_SECRET" "$INPUT_REFRESH_TOKEN_SECRET" "ci-e2e-refresh-secret"
          resolve_secret "SESSION_SECRET" "$INPUT_SESSION_SECRET" "ci-e2e-session-secret"
          resolve_secret "BETTER_AUTH_SECRET" "$INPUT_BETTER_AUTH_SECRET" "ci-e2e-session-secret"
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
        env:
          INPUT_TOKEN_SECRET: ${{ secrets.E2E_TOKEN_SECRET }}
          INPUT_REFRESH_TOKEN_SECRET: ${{ secrets.E2E_REFRESH_TOKEN_SECRET }}
          INPUT_SESSION_SECRET: ${{ secrets.E2E_SESSION_SECRET }}
          INPUT_BETTER_AUTH_SECRET: ${{ secrets.E2E_SESSION_SECRET }}

      - name: Start backend
        run: |
          bun run src/index.ts &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"
          # Wait up to 60s for the backend to be healthy (DB connected)
          for i in $(seq 1 30); do
            if curl -s http://localhost:4000/health | grep -q '"healthy":true'; then
              echo "Backend ready after ${i}×2s"
              exit 0
            fi
            if ! kill -0 $BACKEND_PID 2>/dev/null; then
              echo "::error::Backend process exited unexpectedly"
              exit 1
            fi
            sleep 2
          done
          echo "::error::Backend did not become ready within 60s"
          exit 1
        working-directory: example-backend
        env:
          AUTH_PROVIDER: better-auth
          BETTER_AUTH_SECRET: ${{ env.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:4000
          PORT: "4000"
          MONGO_URI: mongodb://127.0.0.1/terreno-e2e?replicaSet=rs0
          TOKEN_SECRET: ${{ env.TOKEN_SECRET }}
          TOKEN_ISSUER: terreno-e2e
          REFRESH_TOKEN_SECRET: ${{ env.REFRESH_TOKEN_SECRET }}
          SESSION_SECRET: ${{ env.SESSION_SECRET }}

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: example-frontend

      - name: Run Playwright tests — ${{ matrix.spec }}
        run: bunx playwright test ${{ matrix.spec }}.spec.ts
        working-directory: example-frontend
        env:
          AUTH_PROVIDER: better-auth
          BETTER_AUTH_SECRET: ${{ env.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:4000
          CI: true
          MONGO_URI: mongodb://127.0.0.1/terreno-e2e?replicaSet=rs0
          TOKEN_SECRET: ${{ env.TOKEN_SECRET }}
          TOKEN_ISSUER: terreno-e2e
          REFRESH_TOKEN_SECRET: ${{ env.REFRESH_TOKEN_SECRET }}
          SESSION_SECRET: ${{ env.SESSION_SECRET }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.spec }}
          path: example-frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-test-results-${{ matrix.spec }}
          path: example-frontend/test-results/
          if-no-files-found: ignore
          retention-days: 30
