name: Docker Build and Deploy

on:
  push:
    branches:
      - master
    paths:
      - "example-backend/**"
      - "api/**"
      - "api-health/**"
      - "admin-backend/**"
      - "ai/**"
      - "feature-flags/**"
      - "example-backend/Dockerfile"
      - ".github/workflows/docker-build-deploy.yml"
  pull_request:
    paths:
      - "example-backend/**"
      - "api/**"
      - "api-health/**"
      - "admin-backend/**"
      - "ai/**"
      - "feature-flags/**"
      - "example-backend/Dockerfile"
      - ".github/workflows/docker-build-deploy.yml"

env:
  REGION: us-central1
  APP_NAME: terreno
  PROJECT: flourish-terreno
  WIF_PROVIDER: projects/966061500091/locations/global/workloadIdentityPools/github-actions/providers/github

jobs:
  check-changes:
    name: Check for relevant changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6

      - name: Check PR diff for backend-related changes
        id: check
        run: |
          CHANGES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -cE '^(example-backend/|api/|api-health/|admin-backend/|ai/|feature-flags/)' || true)
          echo "has_changes=$( [ "$CHANGES" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

  build-and-deploy:
    name: Build and Deploy
    needs: [check-changes]
    if: >-
      always() &&
      (github.event_name == 'push' || needs.check-changes.outputs.has_changes == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      deployments: write
    steps:
      - name: Determine image tag
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "is_production=true" >> $GITHUB_OUTPUT
          else
            echo "image_tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "is_production=false" >> $GITHUB_OUTPUT
          fi
          echo "sha_tag=sha-$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: terreno-ci@${{ env.PROJECT }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./example-backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.APP_NAME }}/${{ env.APP_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.APP_NAME }}/${{ env.APP_NAME }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Production: deploy with full traffic ---
      - name: Deploy to Cloud Run (production)
        if: steps.meta.outputs.is_production == 'true'
        run: |
          gcloud run deploy ${{ env.APP_NAME }}-api \
            --project ${{ env.PROJECT }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --image "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.APP_NAME }}/${{ env.APP_NAME }}:${{ steps.meta.outputs.image_tag }}" \
            --no-traffic \
            --quiet

          gcloud run services update-traffic ${{ env.APP_NAME }}-api \
            --project ${{ env.PROJECT }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --to-latest

      # --- PR: deploy with tag, no traffic ---
      - name: Deploy to Cloud Run (PR preview)
        if: steps.meta.outputs.is_production == 'false'
        run: |
          gcloud run deploy ${{ env.APP_NAME }}-api \
            --project ${{ env.PROJECT }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --image "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.APP_NAME }}/${{ env.APP_NAME }}:${{ steps.meta.outputs.image_tag }}" \
            --tag pr-${{ github.event.pull_request.number }} \
            --no-traffic \
            --quiet

      - name: Create GitHub Deployment
        if: always() && steps.meta.outputs.is_production == 'true'
        id: create-deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'example-backend',
              auto_merge: false,
              required_contexts: [],
              description: 'Backend Production Deployment'
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Update deployment status
        if: always() && steps.create-deployment.outputs.deployment_id
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state,
              description: `Backend deployment ${state}`
            });
