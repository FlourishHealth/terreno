name: Example Frontend Deploy

on:
  push:
    branches:
      - "**"
    paths:
      - "example-frontend/**"
      - "ui/**"
      - "rtk/**"
      - "ai/**"
      - "admin-frontend/**"
      - ".github/workflows/frontend-example-deploy.yml"
  pull_request:

jobs:
  check-changes:
    name: Check for relevant changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6

      - name: Check PR diff for frontend-related changes
        id: check
        run: |
          CHANGES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -cE '^(example-frontend/|ui/|rtk/|admin-frontend/)' || true)
          echo "has_changes=$( [ "$CHANGES" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    name: Build Example Frontend
    needs: [check-changes]
    if: always() && (github.event_name == 'push' || needs.check-changes.outputs.has_changes == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies (workspace)
        run: bun install --frozen-lockfile

      - name: Build UI dependency
        run: bun run compile
        working-directory: ui

      - name: Build RTK dependency
        run: bun run compile
        working-directory: rtk

      - name: Build Admin Frontend dependency
        run: bun run compile
        working-directory: admin-frontend

      - name: Build API dependency
        run: bun run compile
        working-directory: api

      - name: Build AI dependency
        run: bun run compile
        working-directory: ai

      - name: Set BASE_URL for deploy
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            URL="https://prod---terreno-backend-example-7knxlrnpqq-uc.a.run.app"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            if [ -z "$PR_NUMBER" ]; then
              PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number // empty')
            fi
            if [ -n "$PR_NUMBER" ]; then
              URL="https://pr-${PR_NUMBER}---terreno-backend-example-7knxlrnpqq-uc.a.run.app"
            else
              URL="https://prod---terreno-backend-example-7knxlrnpqq-uc.a.run.app"
            fi
          fi
          jq --arg url "$URL" '.expo.extra.BASE_URL = $url' app.json > app.json.tmp && mv app.json.tmp app.json
          echo "BASE_URL set to $URL"
        working-directory: example-frontend
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Export example-frontend for web
        run: bun run export
        working-directory: example-frontend

      - name: Fix asset paths for Netlify
        run: bash demo/scripts/fix-netlify-assets.sh example-frontend/dist

      - name: Add Netlify SPA redirects
        run: echo '/*    /index.html   200' > example-frontend/dist/_redirects

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-example-dist
          path: example-frontend/dist
          retention-days: 1

  deploy-branch:
    name: Deploy Branch Preview
    needs: build
    if: github.event_name == 'push' && github.ref != 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      statuses: write
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: frontend-example-dist
          path: dist

      - name: Get branch alias
        id: branch
        run: |
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "alias=pr${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "env=example-frontend-preview-pr${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${{ github.ref_name }}"
            SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-' | tr -cd '[:alnum:]-' | cut -c1-30)
            echo "alias=branch-${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
            echo "env=example-frontend-preview-branch-${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deactivate previous branch deployments
        uses: actions/github-script@v8
        with:
          script: |
            const environment = '${{ steps.branch.outputs.env }}';
            try {
              const deployments = await github.rest.repos.listDeployments({
                ...context.repo,
                environment,
              });
              for (const deployment of deployments.data) {
                await github.rest.repos.createDeploymentStatus({
                  ...context.repo,
                  deployment_id: deployment.id,
                  state: 'inactive',
                });
              }
            } catch (e) {
              core.info(`No previous deployments found for ${environment}`);
            }

      - name: Create GitHub Deployment
        id: create-deployment
        uses: actions/github-script@v8
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ steps.branch.outputs.env }}',
              transient_environment: true,
              auto_merge: false,
              required_contexts: [],
              description: 'Example Frontend Branch Preview Deployment'
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Set deployment status to in_progress
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Deploying example frontend branch preview to Netlify'
            });

      - name: Deploy to Netlify
        id: netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./dist"
          production-deploy: false
          alias: ${{ steps.branch.outputs.alias }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Branch preview for ${{ github.ref_name }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-github-deployment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_FRONTEND_EXAMPLE_SITE_ID }}
        timeout-minutes: 5

      - name: Set deployment status to success
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'success',
              environment_url: '${{ steps.netlify.outputs.deploy-url }}',
              description: 'Example frontend branch preview deployed successfully'
            });

      - name: Set deployment status to failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Example frontend branch preview deployment failed'
            });

  deploy-production:
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      statuses: write
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: frontend-example-dist
          path: dist

      - name: Get commit message header
        id: commit
        run: echo "message=$(echo "$COMMIT_MSG" | head -n 1)" >> "$GITHUB_OUTPUT"
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Create GitHub Deployment
        id: create-deployment
        uses: actions/github-script@v8
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'example-frontend',
              auto_merge: false,
              required_contexts: [],
              description: 'Example Frontend Production Deployment'
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Set deployment status to in_progress
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Deploying example frontend to Netlify'
            });

      - name: Deploy to Netlify
        id: netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./dist"
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions - ${{ steps.commit.outputs.message }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-github-deployment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_FRONTEND_EXAMPLE_SITE_ID }}
        timeout-minutes: 5

      - name: Set deployment status to success
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'success',
              environment_url: '${{ steps.netlify.outputs.deploy-url }}',
              description: 'Example frontend deployed successfully'
            });

      - name: Set deployment status to failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Example frontend deployment failed'
            });

  deploy-preview:
    name: Deploy Preview
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: example-frontend-preview-pr-${{ github.event.pull_request.number }}
      url: ${{ steps.netlify.outputs.deploy-url }}
    permissions:
      contents: read
      deployments: write
      statuses: write
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: frontend-example-dist
          path: dist

      - name: Deactivate previous preview deployments
        uses: actions/github-script@v8
        with:
          script: |
            const environment = `example-frontend-preview-pr-${{ github.event.pull_request.number }}`;
            try {
              const deployments = await github.rest.repos.listDeployments({
                ...context.repo,
                environment,
              });
              for (const deployment of deployments.data) {
                await github.rest.repos.createDeploymentStatus({
                  ...context.repo,
                  deployment_id: deployment.id,
                  state: 'inactive',
                });
              }
            } catch (e) {
              core.info(`No previous deployments found for ${environment}`);
            }

      - name: Create GitHub Deployment
        id: create-deployment
        uses: actions/github-script@v8
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: `example-frontend-preview-pr-${{ github.event.pull_request.number }}`,
              transient_environment: true,
              auto_merge: false,
              required_contexts: [],
              description: 'Example Frontend Preview Deployment'
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Set deployment status to in_progress
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Deploying example frontend preview to Netlify'
            });

      - name: Deploy to Netlify
        id: netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./dist"
          production-deploy: false
          alias: pr-${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Preview for PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-github-deployment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_FRONTEND_EXAMPLE_SITE_ID }}
        timeout-minutes: 5

      - name: Set deployment status to success
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'success',
              environment_url: '${{ steps.netlify.outputs.deploy-url }}',
              description: 'Example frontend preview deployed successfully'
            });

      - name: Set deployment status to failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Example frontend preview deployment failed'
            });
