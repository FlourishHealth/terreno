name: Docs Deploy

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "website/**"
      - "api/src/**"
      - "rtk/src/**"
      - "demo/demoConfig.tsx"
      - "demo/story-config/**"
      - "ui/src/**"
      - ".github/workflows/docs-deploy.yml"
      - "netlify.toml"
  pull_request:
    paths:
      - "docs/**"
      - "website/**"
      - "api/src/**"
      - "rtk/src/**"
      - "demo/demoConfig.tsx"
      - "demo/story-config/**"
      - "ui/src/**"
      - ".github/workflows/docs-deploy.yml"
      - "netlify.toml"

jobs:
  check-changes:
    name: Check for relevant changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6

      - name: Check PR diff for docs-relevant changes
        id: check
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only)
          CHANGES=$(echo "$FILES" | grep -cE '^(docs/|website/|api/src/|rtk/src/|demo/demoConfig\.tsx|demo/story-config/|ui/src/|netlify\.toml)' || true)
          echo "has_changes=$( [ "$CHANGES" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    name: Build docs site
    needs: [check-changes]
    if: always() && (github.event_name == 'push' || needs.check-changes.outputs.has_changes == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun + node_modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            website/node_modules
          key: bun-docs-${{ runner.os }}-${{ hashFiles('bun.lock', 'website/package.json') }}
          restore-keys: |
            bun-docs-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile UI package
        run: bun run compile
        working-directory: ui

      - name: Generate UI type documentation
        run: bun run types
        working-directory: ui

      - name: Build docs site
        run: bun run website:build
        env:
          DEMO_URL: https://terreno-demo.netlify.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docs-dist
          path: website/build
          retention-days: 1

  deploy-production:
    name: Deploy docs to production
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      statuses: write
    steps:
      - uses: actions/checkout@v6

      - name: Validate required secrets
        run: |
          missing=()
          if [ -z "${{ secrets.NETLIFY_AUTH_TOKEN }}" ]; then missing+=("NETLIFY_AUTH_TOKEN"); fi
          if [ -z "${{ secrets.NETLIFY_DOCS_SITE_ID }}" ]; then missing+=("NETLIFY_DOCS_SITE_ID"); fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: docs-dist
          path: dist

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v4.0
        with:
          publish-dir: "./dist"
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Docs deploy from GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-github-deployment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DOCS_SITE_ID }}
        timeout-minutes: 5

  deploy-preview:
    name: Deploy docs preview
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: docs-preview-pr-${{ github.event.pull_request.number }}
      url: ${{ steps.netlify.outputs.deploy-url }}
    permissions:
      contents: read
      deployments: write
      statuses: write
    steps:
      - uses: actions/checkout@v6

      - name: Validate required secrets
        run: |
          missing=()
          if [ -z "${{ secrets.NETLIFY_AUTH_TOKEN }}" ]; then missing+=("NETLIFY_AUTH_TOKEN"); fi
          if [ -z "${{ secrets.NETLIFY_DOCS_SITE_ID }}" ]; then missing+=("NETLIFY_DOCS_SITE_ID"); fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: docs-dist
          path: dist

      - name: Deploy to Netlify
        id: netlify
        uses: nwtgck/actions-netlify@v4.0
        with:
          publish-dir: "./dist"
          production-deploy: false
          alias: docs-pr-${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Docs preview for PR #${{ github.event.pull_request.number }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-github-deployment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DOCS_SITE_ID }}
        timeout-minutes: 5
