  update-version-on-master:
    needs: [check-changes, publish-api, publish-ui, publish-rtk, publish-admin-backend, publish-admin-frontend, publish-ai, publish-api-health, publish-feature-flags]
    # Run if any package was published and this is not a prerelease (beta/alpha) tag
    if: |
      always() &&
      !contains(needs.check-changes.outputs.version, '-beta') &&
      !contains(needs.check-changes.outputs.version, '-alpha') &&
      (needs.publish-api.result == 'success' || needs.publish-ui.result == 'success' || needs.publish-rtk.result == 'success' || needs.publish-admin-backend.result == 'success' || needs.publish-admin-frontend.result == 'success' || needs.publish-ai.result == 'success' || needs.publish-api-health.result == 'success' || needs.publish-feature-flags.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate required secrets
        env:
          REPO_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          missing=()
          if [ -z "$REPO_ADMIN_TOKEN" ]; then missing+=("REPO_ADMIN_TOKEN"); fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.REPO_ADMIN_TOKEN }}
          persist-credentials: true

      - name: Setup Git
        run: |
          git config --global user.name "joshgachnang"
          git config --global user.email "josh@flourish.health"

      - name: Update package versions
        run: |
          VERSION="${{ needs.check-changes.outputs.version }}"
          update_version() {
            local dir=$1
            local result=$2
            if [ "$result" == "success" ]; then
              cd "$dir" && node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.version = '$VERSION'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');" && cd ..
            fi
          }

          update_version api "${{ needs.publish-api.result }}"
          update_version ui "${{ needs.publish-ui.result }}"
          update_version rtk "${{ needs.publish-rtk.result }}"
          update_version admin-backend "${{ needs.publish-admin-backend.result }}"
          update_version admin-frontend "${{ needs.publish-admin-frontend.result }}"
          update_version ai "${{ needs.publish-ai.result }}"
          update_version api-health "${{ needs.publish-api-health.result }}"
          update_version feature-flags "${{ needs.publish-feature-flags.result }}"

      - name: Commit and push to master
        run: |
          VERSION="${{ needs.check-changes.outputs.version }}"
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: bump package versions to ${VERSION}"
            git pull --rebase origin master
            git push origin master
          fi

  notify:
    needs: [check-changes, publish-api, publish-ui, publish-rtk, publish-admin-backend, publish-admin-frontend, publish-ai, publish-api-health, publish-feature-flags]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build notification message
        id: message
        run: |
          VERSION="${{ needs.check-changes.outputs.version }}"
          MESSAGE="Release $VERSION:\n"

          add_status() {
            local name=$1
            local result=$2
            if [ "$result" == "success" ]; then
              MESSAGE="$MESSAGE✅ ${name}@$VERSION published\n"
            elif [ "$result" == "skipped" ]; then
              MESSAGE="$MESSAGE⏭️ ${name} skipped (no changes)\n"
            elif [ "$result" == "failure" ]; then
              MESSAGE="$MESSAGE❌ ${name} failed\n"
            fi
          }

          add_status "@terreno/api" "${{ needs.publish-api.result }}"
          add_status "@terreno/ui" "${{ needs.publish-ui.result }}"
          add_status "@terreno/rtk" "${{ needs.publish-rtk.result }}"
          add_status "@terreno/admin-backend" "${{ needs.publish-admin-backend.result }}"
          add_status "@terreno/admin-frontend" "${{ needs.publish-admin-frontend.result }}"
          add_status "@terreno/ai" "${{ needs.publish-ai.result }}"
          add_status "@terreno/api-health" "${{ needs.publish-api-health.result }}"
          add_status "@terreno/feature-flags" "${{ needs.publish-feature-flags.result }}"
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT

      - name: Zoom Chat Notification
        run: |
          VERSION="${{ needs.check-changes.outputs.version }}"
          TAG_NAME="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          TAG_URL="https://github.com/${REPO}/releases/tag/${TAG_NAME}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          
          MESSAGE="${{ steps.message.outputs.message }}"
          MESSAGE="${MESSAGE}Tag: ${TAG_NAME}\n"
          MESSAGE="${MESSAGE}Commit: ${COMMIT_SHORT}\n"
          MESSAGE="${MESSAGE}View: ${TAG_URL}"
          
          # Convert \n escape sequences to actual newlines
          MESSAGE=$(printf "%b" "$MESSAGE")
          
          curl -X POST "${{ secrets.ZOOM_WEBHOOK_URL }}" \
            -H "Authorization: ${{ secrets.ZOOM_WEBHOOK_TOKEN }}" \
            -H "Content-Type: text/plain" \
            --data-raw "$MESSAGE"
