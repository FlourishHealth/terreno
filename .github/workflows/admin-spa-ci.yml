# Admin SPA CI: lint, compile the server plugin, run unit tests, build the web export,
# and run a backend-free smoke + Playwright e2e against the built bundle.
name: Admin SPA CI

on:
  push:
    paths:
      - "admin-spa/**"
      - "admin-frontend/**"
      - "rtk/**"
      - "ui/**"
      - ".github/workflows/admin-spa-ci.yml"

jobs:
  build-and-e2e:
    name: Admin SPA Build and E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-spa
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ github.ref }}-
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      # Compile workspace dependencies (server plugin + app typecheck need their types).
      - name: Build workspace dependencies
        run: bun run --filter '@terreno/ui' --filter '@terreno/rtk' --filter '@terreno/admin-frontend' --filter '@terreno/api' compile
        working-directory: .

      - name: Lint
        run: bun run lint

      - name: Compile server plugin
        run: bun run compile

      - name: Typecheck app
        run: bunx tsc --noEmit -p tsconfig.json

      - name: Unit tests (serve plugin)
        run: bun run test:ci

      - name: Build web export
        run: bun run build:web

      - name: Smoke check (backend-free)
        run: bun run smoke

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: E2E (anonymous -> login)
        run: bun run test:e2e
        env:
          CI: true
