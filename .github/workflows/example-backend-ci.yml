name: Example Backend CI

on:
  push:
    paths:
      - "ai/**"
      - "admin-backend/**"
      - "example-backend/**"
      - "api-health/**"
      - "feature-flags/**"
      - "scripts/check-coverage.ts"
      - ".github/workflows/example-backend-ci.yml"

jobs:
  lint-and-test:
    name: Example Backend Lint, Build, and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mongodb-version: ["6.0"]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ github.ref }}-
            bun-${{ runner.os }}-

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: ${{ matrix.mongodb-version }}
          mongodb-image: mirror.gcr.io/library/mongo

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build dependencies since example-backend depends on them
      - name: Build API dependency
        run: bun run compile
        working-directory: api

      - name: Build AI dependency
        run: bun run compile
        working-directory: ai

      - name: Build API Health dependency
        run: bun run compile
        working-directory: api-health

      - name: Build Admin Backend dependency
        run: bun run compile
        working-directory: admin-backend

      - name: Build Feature Flags dependency
        run: bun run compile
        working-directory: feature-flags

      - name: Build UI dependency
        run: bun run compile
        working-directory: ui

      - name: Test AI with coverage threshold
        run: bun run test:coverage
        working-directory: ai
        env:
          CI: true

      - name: Test API Health with coverage threshold
        run: bun run test:coverage
        working-directory: api-health
        env:
          CI: true

      - name: Test Admin Backend with coverage threshold
        run: bun run test:coverage
        working-directory: admin-backend
        env:
          CI: true

      - name: Test Feature Flags with coverage threshold
        run: bun run test:coverage
        working-directory: feature-flags
        env:
          CI: true

      - name: Lint
        run: bun run lint
        working-directory: example-backend

      - name: Build
        run: bun run compile
        working-directory: example-backend

      - name: Test with coverage threshold
        run: bun run test:coverage
        working-directory: example-backend
        env:
          CI: true

