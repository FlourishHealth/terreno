name: Demo Appium CI

on:
  push:
    paths:
      - "ui/**"
      - "demo/appium/**"
      - "demo/package.json"
      - "demo/app.json"
      - "demo/eas.json"
      - ".github/workflows/demo-appium-ci.yml"

jobs:
  appium-android:
    name: Demo Appium · Android
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ github.ref }}-
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI dependency
        run: bun run compile
        working-directory: ui

      - name: Generate UI type documentation
        run: bun run types
        working-directory: ui

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Prebuild Android project
        run: CI=1 APPIUM_CI=true bunx expo prebuild --platform android --clean
        working-directory: demo
        env:
          NODE_ENV: production
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Build Android debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: demo/android
        env:
          NODE_ENV: production
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Appium Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6
          ram-size: 4096M
          cores: 4
          disable-animations: true
          disable-spellchecker: true
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          script: cd demo && export ANDROID_APP_PATH="$GITHUB_WORKSPACE/demo/android/app/build/outputs/apk/debug/app-debug.apk" && CI=true APPIUM_CI=true NODE_ENV=production bun run appium:test:ci:android
        env:
          APPIUM_CI: "true"
          NODE_ENV: production
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Upload Appium logs
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: demo-appium-android-logs
          path: demo/logs/
          if-no-files-found: ignore
          retention-days: 7

  appium-ios:
    name: Demo Appium · iOS
    # macos-latest resolves to macos-26 with iOS 26.x beta runtimes that break WDA (xcodebuild exit 70).
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ github.ref }}-
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI dependency
        run: bun run compile
        working-directory: ui

      - name: Generate UI type documentation
        run: bun run types
        working-directory: ui

      - name: Prebuild iOS project
        run: CI=1 APPIUM_CI=true bunx expo prebuild --platform ios --clean
        working-directory: demo
        env:
          NODE_ENV: production

      - name: Build iOS simulator app
        run: |
          set -euo pipefail
          WORKSPACE=$(find ios -name '*.xcworkspace' | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "::error::Could not find iOS workspace after prebuild"
            exit 1
          fi
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace=$WORKSPACE scheme=$SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO
        working-directory: demo
        env:
          NODE_ENV: production
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Run Appium iOS tests
        run: |
          set -eu
          IOS_APP_PATH="$(find "$GITHUB_WORKSPACE/demo/ios/build" -type d -name 'TerrenoDemo.app' -path '*Release-iphonesimulator*' | head -1)"
          if [ -z "$IOS_APP_PATH" ]; then
            echo "::error::Could not locate built iOS simulator app"
            exit 1
          fi
          eval "$(bun demo/appium/selectIosSimulator.ts)"
          echo "Using simulator: $IOS_DEVICE_NAME ($IOS_DEVICE_UDID) on iOS $IOS_PLATFORM_VERSION"
          echo "Using app bundle: $IOS_APP_PATH"
          xcrun simctl boot "$IOS_DEVICE_UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$IOS_DEVICE_UDID" -b
          cd demo
          CI=true \
            APPIUM_CI=true \
            NODE_ENV=production \
            IOS_APP_PATH="$IOS_APP_PATH" \
            IOS_DEVICE_NAME="$IOS_DEVICE_NAME" \
            IOS_DEVICE_UDID="$IOS_DEVICE_UDID" \
            IOS_PLATFORM_VERSION="$IOS_PLATFORM_VERSION" \
            bun run appium:test:ci:ios
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Upload Appium logs
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: demo-appium-ios-logs
          path: demo/logs/
          if-no-files-found: ignore
          retention-days: 7
