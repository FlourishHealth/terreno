name: Demo Appium CI

on:
  push:
    paths:
      - "ui/**"
      - "demo/appium/**"
      - ".github/workflows/demo-appium-ci.yml"

jobs:
  appium:
    name: Demo Appium Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ github.ref }}-
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI dependency
        run: bun run compile
        working-directory: ui

      - name: Generate UI type documentation
        run: bun run types
        working-directory: ui

      - name: Export demo for web
        run: bun run export
        working-directory: demo
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Serve demo static build
        run: bunx serve -s dist -l 8085 &
        working-directory: demo

      - name: Wait for demo server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8085/demo > /dev/null && exit 0
            sleep 2
          done
          echo "Demo server failed to start" && exit 1

      - name: Run Appium tests
        run: bun run appium:test:ci
        working-directory: demo
        env:
          CI: true
          DEMO_BASE_URL: http://localhost:8085
          CHROME_BINARY: /usr/bin/google-chrome-stable

      - name: Upload Appium logs
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: demo-appium-logs
          path: demo/logs/
          if-no-files-found: ignore
          retention-days: 7
