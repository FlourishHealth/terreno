name: Preview Cleanup

on:
  pull_request:
    types: [closed]

env:
  GCP_PROJECT_ID: flourish-terreno
  GCP_REGION: us-central1
  GCP_SERVICE_NAME: terreno-backend-example

jobs:
  cleanup:
    name: Clean Up Preview Resources
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      id-token: write
    steps:
      - name: Validate required secrets
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          missing=()
          if [ -z "$GCP_SA_KEY" ]; then missing+=("GCP_SA_KEY"); fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - uses: actions/checkout@v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Remove Cloud Run preview tag
        run: |
          gcloud run services update-traffic ${{ env.GCP_SERVICE_NAME }} \
            --remove-tags=pr-${{ github.event.pull_request.number }} \
            --region=${{ env.GCP_REGION }} || true

      - name: Drop preview database
        env:
          MONGO_DB_NAME: terreno-example-pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          export MONGO_URI
          MONGO_URI="$(gcloud secrets versions access latest \
            --secret="${GCP_SERVICE_NAME}-mongodb-uri" \
            --project="${GCP_PROJECT_ID}")"
          node --input-type=module -e '
            import("mongodb").then(async ({MongoClient}) => {
              const client = new MongoClient(process.env.MONGO_URI);
              await client.connect();
              await client.db(process.env.MONGO_DB_NAME).dropDatabase();
              await client.close();
              console.info(`Dropped preview database ${process.env.MONGO_DB_NAME}`);
            });
          '
        working-directory: example-backend

      - name: Deactivate deployments
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const pr = ${{ github.event.pull_request.number }};
            const envNames = [
              `demo-preview-pr-${pr}`,
              `example-frontend-preview-pr-${pr}`,
              `example-backend-preview-pr-${pr}`,
              // Legacy environment names from before pr-N naming convention
              `frontend-example-preview-pr-${pr}`,
              'demo-preview',
              'example-frontend-preview',
            ];
            for (const envName of envNames) {
              try {
                const deployments = await github.rest.repos.listDeployments({
                  ...context.repo,
                  environment: envName,
                });
                for (const deployment of deployments.data) {
                  await github.rest.repos.createDeploymentStatus({
                    ...context.repo,
                    deployment_id: deployment.id,
                    state: 'inactive',
                  });
                }
              } catch (e) {
                core.info(`No deployments found for ${envName}`);
              }
            }
