name: Terraform Apply (Infra Manager)

on:
  push:
    branches:
      - master
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_DEPLOYMENT: terreno-prod
  TF_SOURCE_DIR: terraform

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: terraform fmt -check -recursive
        working-directory: terraform
        run: terraform fmt -check -recursive

  preview:
    name: Preview
    if: github.event_name == 'pull_request'
    needs: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Skip if env not bootstrapped
        id: gate
        run: |
          if [ -z "${{ vars.GCP_TF_PROJECT_ID_PROD }}" ] || [ -z "${{ vars.GCP_WIF_PROVIDER_PROD }}" ] || [ -z "${{ vars.GCP_TF_ADMIN_SA_PROD }}" ]; then
            echo "::notice::Environment has not been bootstrapped yet; skipping preview."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        if: steps.gate.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_PROD }}
          service_account: ${{ vars.GCP_TF_ADMIN_SA_PROD }}

      - name: Set up Cloud SDK
        if: steps.gate.outputs.skip != 'true'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_TF_PROJECT_ID_PROD }}

      - name: Create Infra Manager preview
        if: steps.gate.outputs.skip != 'true'
        id: preview
        run: |
          set -euo pipefail
          LOCATION="${{ vars.GCP_INFRA_MANAGER_LOCATION || 'us-central1' }}"
          PREVIEW_ID="${TF_DEPLOYMENT}-pr${{ github.event.pull_request.number }}-${GITHUB_RUN_ID}"
          echo "preview_id=$PREVIEW_ID" >> "$GITHUB_OUTPUT"
          echo "location=$LOCATION" >> "$GITHUB_OUTPUT"
          gcloud infra-manager previews create "$PREVIEW_ID" \
            --project="${{ vars.GCP_TF_PROJECT_ID_PROD }}" \
            --location="$LOCATION" \
            --deployment="projects/${{ vars.GCP_TF_PROJECT_ID_PROD }}/locations/${LOCATION}/deployments/${TF_DEPLOYMENT}" \
            --service-account="projects/${{ vars.GCP_TF_PROJECT_ID_PROD }}/serviceAccounts/${{ vars.GCP_TF_ADMIN_SA_PROD }}" \
            --local-source="${TF_SOURCE_DIR}" \
            --quiet

      - name: Describe preview
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          gcloud infra-manager previews describe \
            "${{ steps.preview.outputs.preview_id }}" \
            --location="${{ steps.preview.outputs.location }}" \
            --project="${{ vars.GCP_TF_PROJECT_ID_PROD }}" \
            --format='yaml(state,errorCode,errorLogs,buildResults)'

      - name: Cleanup preview
        if: steps.gate.outputs.skip != 'true' && always()
        run: |
          gcloud infra-manager previews delete \
            "${{ steps.preview.outputs.preview_id }}" \
            --location="${{ steps.preview.outputs.location }}" \
            --project="${{ vars.GCP_TF_PROJECT_ID_PROD }}" \
            --quiet || true

  apply:
    name: Apply
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate required vars
        run: |
          missing=()
          [ -z "${{ vars.GCP_TF_PROJECT_ID_PROD }}" ] && missing+=("GCP_TF_PROJECT_ID_PROD")
          [ -z "${{ vars.GCP_WIF_PROVIDER_PROD }}" ] && missing+=("GCP_WIF_PROVIDER_PROD")
          [ -z "${{ vars.GCP_TF_ADMIN_SA_PROD }}" ] && missing+=("GCP_TF_ADMIN_SA_PROD")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required repository variables: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_PROD }}
          service_account: ${{ vars.GCP_TF_ADMIN_SA_PROD }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_TF_PROJECT_ID_PROD }}

      - name: Apply Infra Manager deployment
        run: |
          set -euo pipefail
          LOCATION="${{ vars.GCP_INFRA_MANAGER_LOCATION || 'us-central1' }}"
          gcloud infra-manager deployments apply "${TF_DEPLOYMENT}" \
            --project="${{ vars.GCP_TF_PROJECT_ID_PROD }}" \
            --location="$LOCATION" \
            --service-account="projects/${{ vars.GCP_TF_PROJECT_ID_PROD }}/serviceAccounts/${{ vars.GCP_TF_ADMIN_SA_PROD }}" \
            --local-source="${TF_SOURCE_DIR}" \
            --quiet

      - name: Show deployment status
        run: |
          LOCATION="${{ vars.GCP_INFRA_MANAGER_LOCATION || 'us-central1' }}"
          gcloud infra-manager deployments describe "${TF_DEPLOYMENT}" \
            --project="${{ vars.GCP_TF_PROJECT_ID_PROD }}" \
            --location="$LOCATION" \
            --format='yaml(state,latestRevision,errorCode)'
