[build]
  base = "website"
  command = "bun install --frozen-lockfile && cd .. && bun run website:generate && cd website && bun run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "22"
  DEMO_URL = "https://terreno-demo.netlify.app"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/demo/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://terreno-docs.netlify.app https://*.netlify.app;"
