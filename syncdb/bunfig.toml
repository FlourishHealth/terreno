[test]
preload = ["./test-preload.ts"]
root = "./src"
coverageSkipTestFiles = true
coveragePathIgnorePatterns = ["**/dist/**", "**/*.test.ts", "**/*.test.tsx", "**/test-preload.ts", "**/node_modules/**"]
# Enforced by scripts/check-coverage.ts; Bun parses this key but does not
# fail the run when coverage is below threshold.
coverageThreshold = { line = 95, function = 95 }
